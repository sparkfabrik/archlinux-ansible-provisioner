---
- name: Load packages variables
  tags: [packages, dev, cloudnative]
  ansible.builtin.include_vars:
    file: "{{ ansible_facts['distribution'] }}.yml"
    name: distro_packages

- name: Install cloud native packages
  tags: [packages, dev, cloudnative]
  block:
    - name: Ensure not installed packages
      when: ansible_facts['distribution'] == "Archlinux"
      community.general.pacman:
        name:
          - neofetch
        state: absent

    - name: Install cloud native packages
      when: ansible_facts['distribution'] == "Archlinux"
      community.general.pacman:
        name: "{{ distro_packages.development_pkgs_cloudnative }}"

    - name: Install cloud native packages from aur
      when: ansible_facts['distribution'] == "Archlinux"
      kewlfft.aur.aur:
        use: paru
        name: "{{ distro_packages.development_pkgs_cloudnative_aur }}"
      become: yes
      become_user: aur_builder

- name: Install development packages
  tags: [packages, dev]
  block:
    - name: Install development packages
      when: ansible_facts['distribution'] == "Archlinux"
      community.general.pacman:
        name: "{{ distro_packages.development_pkgs_dev }}"

    - name: Install development packages using npm
      community.general.npm:
        name: "@github/copilot"
        global: true

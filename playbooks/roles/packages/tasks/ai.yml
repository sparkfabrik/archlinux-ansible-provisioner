---
- name: Install development AI packages
  tags: [packages, dev, ai]
  block:
    - name: Install opencode from npm
      community.general.npm:
        name: opencode-ai
        global: true
        state: present

    - name: Install openspec from npm
      community.general.npm:
        name: "@fission-ai/openspec"
        global: true
        state: present

    - name: Ensure zsh site-functions directory exists
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Generate opencode zsh completions
      ansible.builtin.command: opencode completion
      register: opencode_completion_output
      changed_when: false
      failed_when: false

    - name: Write opencode completions to file
      ansible.builtin.copy:
        content: "{{ opencode_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_opencode"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - opencode_completion_output is not skipped
        - opencode_completion_output.rc == 0

    - name: Generate openspec zsh completions
      ansible.builtin.command: openspec completion generate zsh
      register: openspec_completion_output
      changed_when: false
      failed_when: false

    - name: Write openspec completions to file
      ansible.builtin.copy:
        content: "{{ openspec_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_openspec"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - openspec_completion_output is not skipped
        - openspec_completion_output.rc == 0

    - name: Create ~/.config/opencode directory
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.config/opencode"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Check if opencode config file is already present from sparkdock
      ansible.builtin.stat:
        path: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
      register: sparkdock_opencode_config_stat

    - name: Check if opencode local override file exists
      ansible.builtin.stat:
        path: "{{ system.home | default(current_home) }}/.config/opencode/opencode.local.json"
      register: opencode_local_config_stat

    - name: Read sparkdock opencode config
      ansible.builtin.slurp:
        src: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
      register: sparkdock_opencode_config_content
      no_log: true
      when:
        - sparkdock_opencode_config_stat.stat.exists == true
        - opencode_local_config_stat.stat.exists == true

    - name: Read opencode local override file
      ansible.builtin.slurp:
        src: "{{ system.home | default(current_home) }}/.config/opencode/opencode.local.json"
      register: opencode_local_config_content
      no_log: true
      when:
        - sparkdock_opencode_config_stat.stat.exists == true
        - opencode_local_config_stat.stat.exists == true

    - name: Write merged opencode config with local overrides
      ansible.builtin.copy:
        content: "{{ (sparkdock_opencode_config_content.content | b64decode | from_json) | combine(opencode_local_config_content.content | b64decode | from_json, recursive=True) | to_nice_json }}\n"
        dest: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      no_log: true
      when:
        - sparkdock_opencode_config_stat.stat.exists == true
        - opencode_local_config_stat.stat.exists == true

    - name: Copy opencode config file from sparkdock (no local overrides)
      ansible.builtin.copy:
        src: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
        dest: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - sparkdock_opencode_config_stat.stat.exists == true
        - opencode_local_config_stat.stat.exists == false

    - name: Create opencode config file as fallback if it doesn't exist from sparkdock
      ansible.builtin.copy:
        dest: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
        src: "files/opencode/opencode.json"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when: not sparkdock_opencode_config_stat.stat.exists

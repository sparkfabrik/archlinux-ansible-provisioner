---
- name: Configure multitouch gestures
  when: desktop.x11_gestures
  tags: [gnome, gestures]
  vars:
    gesture_ext:
      - x11gestures@joseexposito.github.io
  block:
  # gnome-shell-extension-x11gestures was removed: it is one of the AUR packages
  # compromised in the June 2026 supply-chain attack (malicious npm install in the
  # PKGBUILD). Do not re-add until the AUR package is cleaned and the maintainer
  # re-verified. See sparkfabrik/archlinux-ansible-provisioner#220.
  - name: Install touchegg and touche
    kewlfft.aur.aur:
      use: paru
      name:
        - touchegg
        - touche
    become: yes
    become_user: aur_builder

  - name: Enable gnome-shell-extension-x11gestures extensions (available after restarting)
    dconf:
      key: "/org/gnome/shell/enabled-extensions"
      value: "{{ desktop.gnome.extensions + gesture_ext }}"
    become: yes
    become_user: '{{ system.username }}'
  
  - name: Enable touchegg
    shell: systemctl enable touchegg

  - name: debug
    debug:
      msg: "Installed extensions: {{ desktop.gnome.extensions + gesture_ext }}"
    when: debug
    become: yes
    become_user: '{{ system.username }}'

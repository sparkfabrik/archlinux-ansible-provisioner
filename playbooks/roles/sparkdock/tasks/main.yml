---
- name: Import sparkdock features
  when: sparkfabrik | default(true)
  tags: [sparkfabrik, sparkdock]
  vars:
    include_string: '[[ ! -f "{{ system.home | default(current_home) }}/.local/spark/sparkdock/config/shell/sparkdock.zshrc" ]] || source "{{ system.home | default(current_home) }}/.local/spark/sparkdock/config/shell/sparkdock.zshrc"'
  become: yes
  become_user: "{{ system.username | default(current_user) }}"
  block:
    - name: Ensure ~/.local/share/zsh/site-functions directory exists
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"

    - name: Git checkout sparkdock
      ansible.builtin.git:
        repo: "https://github.com/sparkfabrik/sparkdock.git"
        dest: "{{ system.home | default(current_home) }}/.local/spark/sparkdock"
        version: master
        update: yes
        # version: <PUT THE DESIRED COMMIT SHA HERE FOR TESTING PURPOSES>

    - name: Check if .zshrc exists
      ansible.builtin.stat:
        path: "{{ system.home | default(current_home) }}/.zshrc"
      register: zshrc_stat

    - name: Ensure sparkdock zsh customization is included in the zshrc file
      ansible.builtin.lineinfile:
        path: "{{ system.home | default(current_home) }}/.zshrc"
        regexp: 'sparkdock\.zshrc'
        line: "{{ include_string }}"
      when: zshrc_stat.stat.exists

- name: Setup ajust (SparkJust for Linux)
  when: sparkfabrik | default(true)
  tags: [sparkfabrik, sparkdock, ajust]
  block:
    - name: Install just task runner
      become: yes
      community.general.pacman:
        name: just
        state: present

    - name: Install ajust wrapper script
      become: yes
      ansible.builtin.copy:
        src: ajust/ajust.sh
        dest: /usr/local/bin/ajust
        mode: "0755"

    - name: Ensure ~/.local/spark/ajust directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/spark/ajust"
        state: directory
        mode: "0755"

    - name: Copy ajust justfile
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.copy:
        src: ajust/justfile
        dest: "{{ system.home | default(current_home) }}/.local/spark/ajust/justfile"
        mode: "0644"

    - name: Ensure ~/.local/share/zsh/site-functions directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"

    - name: Generate ajust zsh completion
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.shell: |
        just --completions zsh | sed -E 's/([\(_" ])just/\1ajust/g' > "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_ajust"
      changed_when: true

    - name: Ensure ~/.local/spark/ajust/recipes directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/spark/ajust/recipes"
        state: directory
        mode: "0755"

- name: Sync AI coding agent resources from upstream repository
  when: sparkfabrik | default(true)
  tags: [sparkfabrik, sparkdock, ai-coding-agents]
  block:
    - name: Ensure agent cache directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.cache/sparkdock"
        state: directory
        mode: "0755"

    - name: Make sparkdock bin scripts executable
      become: yes
      ansible.builtin.shell: chmod +x "{{ system.home | default(current_home) }}/.local/spark/sparkdock/bin/"*
      changed_when: false

    - name: Run agent resources sync
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: "{{ system.home | default(current_home) }}/.local/spark/sparkdock/bin/sparkdock-agents-sync"
      register: agents_sync_output
      changed_when: "'added' in agents_sync_output.stdout or 'updated' in agents_sync_output.stdout"

    - name: Show agent resources sync output
      ansible.builtin.debug:
        msg: "{{ agents_sync_output.stdout_lines }}"
      when: agents_sync_output.stdout_lines | length > 0

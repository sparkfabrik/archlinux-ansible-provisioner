---
- name: Ensure sparkdock repository is cloned and up-to-date
  tags: [always]
  become: yes
  become_user: "{{ system.username | default(current_user) }}"
  block:
    - name: Git checkout sparkdock
      ansible.builtin.git:
        repo: "https://github.com/sparkfabrik/sparkdock.git"
        dest: "{{ sparkdock.path | default(sparkdock_default_path) }}"
        version: master
        update: yes
        force: yes

- name: Sync AI coding agent resources from upstream repository
  when: sparkfabrik | default(true)
  tags: [sparkfabrik, sparkdock, ai-coding-agents]
  block:
    - name: Ensure agent cache directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.cache/sparkdock"
        state: directory
        mode: "0755"

    - name: Make sparkdock bin scripts executable
      become: yes
      ansible.builtin.shell: chmod +x "{{ sparkdock.path | default(sparkdock_default_path) }}/bin/"*
      changed_when: false

    - name: Run agent resources sync
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.shell: |
        # Wrap gum to skip TTY-dependent subcommands (spin) in non-interactive Ansible context.
        export _REAL_GUM=$(command -v gum)
        gum() {
          if [[ "$1" == "spin" ]]; then
            shift
            # Skip all arguments until the '--' separator.
            while [[ $# -gt 0 && "$1" != "--" ]]; do shift; done
            # Skip the '--' separator itself.
            [[ "${1:-}" == "--" ]] && shift
            "$@"
          elif [[ -n "$_REAL_GUM" ]]; then
            "$_REAL_GUM" "$@"
          fi
          # If gum is not installed, non-spin calls become no-ops (cosmetic only)
          # instead of executing an empty command (rc 127).
        }
        export -f gum
        {{ sparkdock.path | default(sparkdock_default_path) }}/bin/sparkdock-agents-sync
      args:
        executable: /bin/bash
      register: agents_sync_output
      changed_when: "'added' in agents_sync_output.stdout or 'updated' in agents_sync_output.stdout"

    - name: Show agent resources sync output
      ansible.builtin.debug:
        msg: "{{ agents_sync_output.stdout_lines }}"
      when: agents_sync_output.stdout_lines | length > 0

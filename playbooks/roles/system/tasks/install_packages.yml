---
# Reflector
- name: Install reflector
  tags: [system, pacman]
  block:
    - name: Install reflector
      community.general.pacman:
        name:
          - reflector

# System packages (originally top-level, no tags)
- name: Install system packages
  community.general.pacman:
    name:
      - btrfs-progs
      - coreutils
      - efibootmgr
      - git
      - grub-btrfs
      - nvme-cli
      - os-prober
      - procps-ng
      - ntfs-3g
      - sudo
      - udisks2
      - util-linux
    state: present
    update_cache: yes

# Fwupd (originally top-level, no tags)
- name: Install fwupd
  community.general.pacman:
    name:
      - fwupd
      - udisks2
    state: present
    update_cache: yes

# Network packages (originally top-level, no tags)
- name: Install network packages
  community.general.pacman:
    name:
      - inetutils
      - whois
    state: present
    update_cache: yes

# Timeshift
- name: Install timeshift
  tags: [timeshift]
  block:
    - name: Install timeshift and autosnap
      kewlfft.aur.aur:
        use: paru
        name:
          - timeshift
      become: yes
      become_user: aur_builder

- name: Install timeshift-autosnap
  tags: [timeshift]
  when: timeshift.autosnap.enabled == true
  block:
    - name: Install timeshift-autosnap
      kewlfft.aur.aur:
        use: paru
        name:
          - timeshift-autosnap
      become: yes
      become_user: aur_builder

# Energy
- name: Install energy packages
  tags: [system, energy]
  block:
    - name: "Install energy saving tools (powertop and power-profiles-daemon)"
      community.general.pacman:
        name:
          - power-profiles-daemon
          - powertop

# Printing
- name: Install printing packages
  tags: [system, printing]
  block:
    - name: Install cups
      community.general.pacman:
        name:
          - cups
          - cups-pdf
          - system-config-printer

# Audio
- name: Install audio packages
  tags: [system, audio]
  block:
    - name: Install pipewire packages (to replace Pulseaudio)
      shell: yes | pacman -Syu pipewire-pulse wireplumber # there isn't a way to install conflicting packages.
    - name: Install audio system dependencies
      community.general.pacman:
        name:
          - alsa-utils
          - alsa-ucm-conf
          - helvum
          - pavucontrol
          - sof-firmware
          - wiremix

# Bluetooth
- name: Install bluetooth packages
  tags: [system, bluetooth]
  block:
    - name: Install bluetooth dependencies
      community.general.pacman:
        name:
          - blueman
          - bluez
          - bluez-utils

# Display
- name: Install display packages
  tags: [system, display]
  block:
    - name: Install xorg and wayland
      community.general.pacman:
        name:
          - xorg
          - xorg-server
          - xorg-xwayland
          - wayland

# Kernel
- name: Install kernel packages
  tags: [system, kernel]
  block:
    - name: Install kernel-modules-hook
      community.general.pacman:
        name:
          - kernel-modules-hook

    - name: "Install linux-lts kernel"
      when: system.kernel == "standard"
      block:
        - name: Install lts kernel
          community.general.pacman:
            name:
              - linux-lts
              - linux-lts-headers
              - linux-firmware
            state: present
            update_cache: yes

        - name: Install linux kernel
          community.general.pacman:
            name:
              - linux
              - linux-headers
              - linux-firmware
            state: present
            update_cache: yes

        - name: Ensure other kernel are not installed
          community.general.pacman:
            name:
              - linux-zen
              - linux-zen-headers
            state: absent
            update_cache: yes
          ignore_errors: yes

    - name: "Linux zen kernel"
      when: system.kernel == "zen"
      block:
        - name: Install linux zen kernel
          community.general.pacman:
            name:
              - linux-zen
              - linux-zen-headers
              - linux-firmware
            state: present
            update_cache: yes
        - name: Ensure other kernel are not installed
          community.general.pacman:
            name:
              - linux
              - linux-headers
            state: absent
            update_cache: yes
          ignore_errors: yes

    - name: "Linux lts kernel"
      when: system.kernel == "lts"
      block:
        - name: Install linux lts kernel
          community.general.pacman:
            name:
              - linux-lts
              - linux-lts-headers
              - linux-firmware
            state: present
            update_cache: yes
        - name: Ensure other kernel are not installed (standard and zen)
          community.general.pacman:
            name:
              - linux
              - linux-zen
              - linux-headers
            state: absent
            update_cache: yes
          ignore_errors: yes

# Laptop — fingerprint reader
- name: "Detect fingerprint reader"
  tags: [system, thinkpad]
  shell: 'lsusb | grep -i "fingerprint"'
  ignore_errors: yes
  register: is_fingerprint_reader

- name: Detect ThinkPad Z16 Gen2 fingerprint reader
  tags: [system, thinkpad]
  shell: 'lsusb  | grep "06cb:0123"'
  ignore_errors: yes
  register: is_fingerprint_reader_z16

- name: Install fingerprint reader packages
  tags: [system, fingerprint]
  when: is_fingerprint_reader.rc == 0 or is_fingerprint_reader_z16.rc == 0
  block:
    - name: Install fprintd
      community.general.pacman:
        name:
          - fprintd

---
- name: Setup ajust (SparkJust for Linux)
  tags: [sf-toolbox, ajust]
  block:
    - name: Install ajust wrapper script
      ansible.builtin.copy:
        src: ajust/ajust.sh
        dest: /usr/local/bin/ajust
        mode: "0755"

    - name: Ensure ~/.local/spark/ajust directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/spark/ajust"
        state: directory
        mode: "0755"

    - name: Copy ajust justfile
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.copy:
        src: ajust/justfile
        dest: "{{ system.home | default(current_home) }}/.local/spark/ajust/justfile"
        mode: "0644"

    - name: Ensure zsh site-functions directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"

    - name: Install ajust zsh completion
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.copy:
        src: ajust/_ajust
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_ajust"
        mode: "0644"

    - name: Ensure ajust recipes directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/spark/ajust/recipes"
        state: directory
        mode: "0755"

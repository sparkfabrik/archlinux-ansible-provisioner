---
# ─── Package cleanup ───────────────────────────────────────────────────────
- name: Remove conflicting packages
  tags: [sf-toolbox, packages]
  block:
    - name: Remove conflicting pacman packages (Archlinux)
      community.general.pacman:
        name: "{{ toolbox.arch.remove.pacman }}"
        state: absent
      ignore_errors: true
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Remove obsolete npm packages
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: absent
      loop: "{{ toolbox.common.remove.npm }}"
      ignore_errors: true

# ─── Package installation ──────────────────────────────────────────────────
- name: Install toolbox packages
  tags: [sf-toolbox, packages]
  block:
    - name: Install pacman packages (Archlinux)
      community.general.pacman:
        name: "{{ toolbox.arch.pacman }}"
        state: present
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Install npm packages (Archlinux)
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: latest
      loop: "{{ toolbox.arch.npm }}"
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Install apt system packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name: "{{ toolbox.debian.apt }}"
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Install homebrew packages (Debian/Ubuntu)
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      community.general.homebrew:
        name: "{{ toolbox.debian.homebrew }}"
        state: latest
        path: /home/linuxbrew/.linuxbrew/bin
      when: ansible_facts['os_family'] == "Debian"

    # Migration: uninstall claude-code (stable) before installing claude-code@latest
    - name: Remove claude-code stable cask (replaced by claude-code@latest)
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      community.general.homebrew_cask:
        name: claude-code
        state: absent
        path: /home/linuxbrew/.linuxbrew/bin
      when: ansible_facts['os_family'] == "Debian"
      ignore_errors: true

    - name: Install homebrew casks (Debian/Ubuntu)
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      community.general.homebrew_cask:
        name: "{{ toolbox.debian.homebrew_casks }}"
        state: latest
        path: /home/linuxbrew/.linuxbrew/bin
      when:
        - ansible_facts['os_family'] == "Debian"
        - toolbox.debian.homebrew_casks | default([]) | length > 0

    - name: Install npm packages (Debian/Ubuntu)
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: latest
      loop: "{{ toolbox.debian.npm | default([]) }}"
      when: ansible_facts['os_family'] == "Debian"

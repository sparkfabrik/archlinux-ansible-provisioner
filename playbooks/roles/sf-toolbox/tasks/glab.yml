---
- name: Configure glab
  tags: [sf-toolbox, packages, glab]
  block:
    - name: Ensure zsh site-functions directory exists
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"

    - name: Generate glab zsh completion
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: glab completion -s zsh
      register: glab_completion_output
      changed_when: false
      failed_when: false

    - name: Write glab completions to file
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.copy:
        content: "{{ glab_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_glab"
        mode: "0644"
      when:
        - glab_completion_output is not skipped
        - glab_completion_output.rc == 0

    - name: Ensure ajust recipes directory exists
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/spark/ajust/recipes"
        state: directory
        mode: "0755"

    - name: Create glab ajust recipe
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.copy:
        src: glab/01-gitlab.just
        dest: "{{ system.home | default(current_home) }}/.local/spark/ajust/recipes/01-gitlab.just"
        mode: "0644"

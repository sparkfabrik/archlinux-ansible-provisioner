---
- name: Install rtk from GitHub releases (Archlinux)
  tags: [sf-toolbox, packages, rtk]
  when: ansible_facts['os_family'] == "Archlinux"
  block:
    - name: Check if rtk is installed
      ansible.builtin.command: /usr/local/bin/rtk --version
      register: rtk_installed
      changed_when: false
      failed_when: false

    - name: Get latest rtk release version from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/rtk-ai/rtk/releases/latest
        return_content: true
        headers:
          Accept: application/vnd.github.v3+json
      register: rtk_latest_release
      changed_when: false

    - name: Set rtk version facts
      ansible.builtin.set_fact:
        rtk_current_version: "{{ rtk_installed.stdout | default('') | regex_replace('^rtk\\s+', '') }}"
        rtk_latest_version: "{{ rtk_latest_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Fail on unsupported architecture for rtk
      ansible.builtin.fail:
        msg: "rtk does not provide a binary for architecture: {{ ansible_facts['architecture'] }}"
      when: ansible_facts['architecture'] not in ['x86_64', 'aarch64']

    - name: Set rtk target architecture
      ansible.builtin.set_fact:
        rtk_target: "{{ rtk_arch_map[ansible_facts['architecture']] }}"
      vars:
        rtk_arch_map:
          x86_64: x86_64-unknown-linux-musl
          aarch64: aarch64-unknown-linux-gnu

    - name: Check rtk release asset availability
      ansible.builtin.set_fact:
        rtk_asset_available: "{{ rtk_latest_release.json.assets | default([]) | map(attribute='name') | select('equalto', 'rtk-' ~ rtk_target ~ '.tar.gz') | list | length > 0 }}"

    - name: Notify rtk fresh installation
      ansible.builtin.debug:
        msg: "rtk is not installed, installing version {{ rtk_latest_version }}"
      when: rtk_installed.rc != 0

    - name: Notify rtk version upgrade
      ansible.builtin.debug:
        msg: "rtk {{ rtk_current_version }} is outdated, upgrading to {{ rtk_latest_version }}"
      when:
        - rtk_installed.rc == 0
        - rtk_current_version != rtk_latest_version

    - name: Notify rtk is up to date
      ansible.builtin.debug:
        msg: "rtk {{ rtk_current_version }} is already the latest version"
      when:
        - rtk_installed.rc == 0
        - rtk_current_version == rtk_latest_version

    - name: Warn when rtk release asset is not yet available
      ansible.builtin.debug:
        msg: >-
          WARNING: rtk release v{{ rtk_latest_version }} does not provide
          rtk-{{ rtk_target }}.tar.gz yet (release assets may still be uploading).
          Skipping rtk installation/upgrade, re-run the provisioner later.
      when:
        - rtk_installed.rc != 0 or rtk_current_version != rtk_latest_version
        - not rtk_asset_available

    - name: Download rtk release tarball
      ansible.builtin.get_url:
        url: "https://github.com/rtk-ai/rtk/releases/download/v{{ rtk_latest_version }}/rtk-{{ rtk_target }}.tar.gz"
        dest: /tmp/rtk.tar.gz
        mode: "0644"
      when:
        - rtk_installed.rc != 0 or rtk_current_version != rtk_latest_version
        - rtk_asset_available

    - name: Create temporary extraction directory for rtk
      ansible.builtin.file:
        path: /tmp/rtk-extract
        state: directory
        mode: "0755"
      when:
        - rtk_installed.rc != 0 or rtk_current_version != rtk_latest_version
        - rtk_asset_available

    - name: Extract rtk tarball to temporary directory
      ansible.builtin.unarchive:
        src: /tmp/rtk.tar.gz
        dest: /tmp/rtk-extract
        remote_src: true
      when:
        - rtk_installed.rc != 0 or rtk_current_version != rtk_latest_version
        - rtk_asset_available

    - name: Install rtk binary to /usr/local/bin
      ansible.builtin.copy:
        src: /tmp/rtk-extract/rtk
        dest: /usr/local/bin/rtk
        mode: "0755"
        remote_src: true
      when:
        - rtk_installed.rc != 0 or rtk_current_version != rtk_latest_version
        - rtk_asset_available

    - name: Verify rtk installation
      ansible.builtin.command: /usr/local/bin/rtk --version
      changed_when: false
      when:
        - rtk_installed.rc != 0 or rtk_current_version != rtk_latest_version
        - rtk_asset_available

    - name: Clean up rtk temporary files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/rtk.tar.gz
        - /tmp/rtk-extract

- name: Install rtk via Homebrew (Debian/Ubuntu)
  tags: [sf-toolbox, packages, rtk]
  when: ansible_facts['os_family'] == "Debian"
  become: true
  become_user: "{{ system.username | default(current_user) }}"
  block:
    - name: Install rtk via Homebrew
      community.general.homebrew:
        name: rtk
        state: latest
        path: /home/linuxbrew/.linuxbrew/bin

- name: Configure rtk
  tags: [sf-toolbox, packages, rtk]
  block:
    - name: Check if rtk setup script exists and is executable
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.stat:
        path: "{{ sparkdock.path | default(sparkdock_default_path) }}/sjust/scripts/rtk/setup.sh"
      register: rtk_setup_script

    - name: Run rtk setup script
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: "{{ sparkdock.path | default(sparkdock_default_path) }}/sjust/scripts/rtk/setup.sh"
      when:
        - rtk_setup_script.stat.exists
        - rtk_setup_script.stat.executable | default(false)
      changed_when: true

    - name: Warn user to manually run rtk setup
      ansible.builtin.debug:
        msg: >-
          WARNING: Automatic rtk configuration was not possible.
          Please run `ajust sf-rtk-setup` manually to complete the setup.
      when: not rtk_setup_script.stat.exists or not (rtk_setup_script.stat.executable | default(false))

---
- name: Install Claude Code (Archlinux)
  tags: [sf-toolbox, packages, ai]
  when: ansible_facts['os_family'] == "Archlinux"
  block:
    - name: Check if Claude Code is already installed
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: claude --version
      register: claude_installed
      changed_when: false
      failed_when: false

    - name: Install Claude Code via official installer
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.shell:
        cmd: curl -fsSL https://claude.ai/install.sh | bash
      environment:
        HOME: "{{ system.home | default(current_home) }}"
      when: claude_installed.rc != 0

    - name: Update Claude Code to the latest version
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: claude update
      environment:
        HOME: "{{ system.home | default(current_home) }}"
      register: claude_update
      changed_when: "'updated' in claude_update.stdout | lower or 'installed' in claude_update.stdout | lower"
      when: claude_installed.rc == 0

- name: Configure AI tools
  tags: [sf-toolbox, packages, ai]
  block:
    - name: Ensure zsh site-functions directory exists
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Generate opencode zsh completions
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: opencode completion
      register: opencode_completion_output
      changed_when: false
      failed_when: false

    - name: Write opencode completions to file
      ansible.builtin.copy:
        content: "{{ opencode_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_opencode"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - opencode_completion_output is not skipped
        - opencode_completion_output.rc == 0

    - name: Generate openspec zsh completions
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: openspec completion generate zsh
      register: openspec_completion_output
      changed_when: false
      failed_when: false

    - name: Write openspec completions to file
      ansible.builtin.copy:
        content: "{{ openspec_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_openspec"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - openspec_completion_output is not skipped
        - openspec_completion_output.rc == 0

    - name: Check if openspec command is available
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.shell: command -v openspec >/dev/null 2>&1 && echo "available" || echo "not-available"
      register: openspec_available
      changed_when: false

    - name: Install or update global OpenSpec skills and prompts for Claude
      become: true
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.command: ajust sf-openspec-install-global claude
      environment:
        HOME: "{{ system.home | default(current_home) }}"
      when: openspec_available.stdout == "available"
      changed_when: true

    - name: Create ~/.config/opencode directory
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.config/opencode"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Notify user about personal opencode configuration
      ansible.builtin.debug:
        msg: >-
          You can create ~/.config/opencode/opencode.json for personal
          customizations. It will be merged with the system-wide configuration
          shipped in /etc/opencode/opencode.json.

    - name: Check if user-local opencode config exists
      ansible.builtin.stat:
        path: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
      register: user_opencode_config

    - name: Compare user-local opencode config with source
      ansible.builtin.command:
        cmd: >-
          diff -q
          "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
          "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
      register: opencode_config_diff
      changed_when: false
      failed_when: opencode_config_diff.rc > 1
      when: user_opencode_config.stat.exists

    - name: Remove duplicate user-local opencode config
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
        state: absent
      when:
        - user_opencode_config.stat.exists
        - opencode_config_diff is not skipped
        - opencode_config_diff.rc == 0

    - name: Warn user about non-custom opencode config
      ansible.builtin.debug:
        msg: >-
          The file ~/.config/opencode/opencode.json should contain only your
          personal customizations. Any configuration already present in the
          system-wide /etc/opencode/opencode.json can be safely removed from
          your local file.
      when:
        - user_opencode_config.stat.exists
        - opencode_config_diff is not skipped
        - opencode_config_diff.rc != 0

    - name: Create /etc/opencode directory
      ansible.builtin.file:
        path: /etc/opencode
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: Copy opencode config file from sparkdock
      ansible.builtin.copy:
        src: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
        dest: /etc/opencode/opencode.json
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Install Claude Code OTel headers helper (sourced from sparkdock)
      become: true
      ansible.builtin.copy:
        src: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/bin/sparkfabrik-claude-code-otel-headers"
        dest: /usr/local/bin/sparkfabrik-claude-code-otel-headers
        mode: "0755"
        owner: root
        group: root

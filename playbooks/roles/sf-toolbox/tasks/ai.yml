---
- name: Configure AI tools
  tags: [sf-toolbox, packages, ai]
  block:
    - name: Ensure zsh site-functions directory exists
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Generate opencode zsh completions
      ansible.builtin.command: opencode completion
      register: opencode_completion_output
      changed_when: false
      failed_when: false

    - name: Write opencode completions to file
      ansible.builtin.copy:
        content: "{{ opencode_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_opencode"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - opencode_completion_output is not skipped
        - opencode_completion_output.rc == 0

    - name: Generate openspec zsh completions
      ansible.builtin.command: openspec completion generate zsh
      register: openspec_completion_output
      changed_when: false
      failed_when: false

    - name: Write openspec completions to file
      ansible.builtin.copy:
        content: "{{ openspec_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_openspec"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - openspec_completion_output is not skipped
        - openspec_completion_output.rc == 0

    - name: Create ~/.config/opencode directory
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.config/opencode"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Copy opencode config file from sparkdock
      ansible.builtin.copy:
        src: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
        dest: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

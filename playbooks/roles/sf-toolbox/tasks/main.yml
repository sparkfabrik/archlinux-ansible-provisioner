---
# ─── Homebrew bootstrap (Debian/Ubuntu only) ───────────────────────────────
- name: Bootstrap Homebrew on Debian/Ubuntu
  tags: [sf-toolbox, packages, homebrew]
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Check if Homebrew is already installed
      ansible.builtin.stat:
        path: /home/linuxbrew/.linuxbrew/bin/brew
      register: homebrew_binary

    - name: Install Homebrew dependencies
      ansible.builtin.apt:
        name:
          - build-essential
          - procps
          - curl
          - file
          - git
        state: present
        update_cache: true
      when: not homebrew_binary.stat.exists

    - name: Install Homebrew
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.shell:
        cmd: NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      environment:
        HOME: "{{ system.home | default(current_home) }}"

    - name: Add Homebrew to PATH via /etc/profile.d
      ansible.builtin.copy:
        dest: /etc/profile.d/homebrew.sh
        mode: "0644"
        content: |
          # Homebrew (linuxbrew) PATH integration
          if [ -d /home/linuxbrew/.linuxbrew ]; then
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          fi

    - name: Add Homebrew taps
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      community.general.homebrew_tap:
        name: "{{ item }}"
        path: /home/linuxbrew/.linuxbrew/bin
        state: present
      loop: "{{ toolbox.debian.homebrew_taps | default([]) }}"

# ─── Package cleanup ───────────────────────────────────────────────────────
- name: Remove conflicting packages
  tags: [sf-toolbox, packages]
  block:
    - name: Remove conflicting pacman packages (Archlinux)
      community.general.pacman:
        name: "{{ toolbox.arch.remove.pacman }}"
        state: absent
      ignore_errors: true
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Remove conflicting apt packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name: "{{ toolbox.debian.remove.apt }}"
        state: absent
      ignore_errors: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Remove conflicting apt sources (Debian/Ubuntu)
      ansible.builtin.file:
        path: "/etc/apt/sources.list.d/{{ item }}"
        state: absent
      loop: "{{ toolbox.debian.remove.apt_sources | default([]) }}"
      when: ansible_facts['os_family'] == "Debian"

    - name: Remove obsolete npm packages
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: absent
      loop: "{{ toolbox.common.remove.npm }}"
      ignore_errors: true

# ─── Package installation ──────────────────────────────────────────────────
- name: Install toolbox packages
  tags: [sf-toolbox, packages]
  block:
    - name: Install pacman packages (Archlinux)
      community.general.pacman:
        name: "{{ toolbox.arch.pacman }}"
        state: present
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Install npm packages (Archlinux)
      community.general.npm:
        name: "{{ item }}"
        global: true
        state: present
      loop: "{{ toolbox.arch.npm }}"
      when: ansible_facts['os_family'] == "Archlinux"

    - name: Install apt system packages (Debian/Ubuntu)
      ansible.builtin.apt:
        name: "{{ toolbox.debian.apt }}"
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Install homebrew packages (Debian/Ubuntu)
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      community.general.homebrew:
        name: "{{ toolbox.debian.homebrew }}"
        state: present
        path: /home/linuxbrew/.linuxbrew/bin
      when: ansible_facts['os_family'] == "Debian"

# ─── Google Cloud SDK (tarball install) ────────────────────────────────────
- name: Install Google Cloud SDK from official tarball
  tags: [sf-toolbox, packages, gcloud]
  block:
      - name: Check if Google Cloud SDK is already installed
        ansible.builtin.stat:
          path: /opt/google-cloud-sdk/bin/gcloud
        register: gcloud_installed

      - name: Download Google Cloud SDK tarball
        ansible.builtin.get_url:
          url: https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-linux-x86_64.tar.gz
          dest: /tmp/google-cloud-cli-linux-x86_64.tar.gz
          mode: "0644"
        when: not gcloud_installed.stat.exists

      - name: Extract Google Cloud SDK to /opt
        ansible.builtin.unarchive:
          src: /tmp/google-cloud-cli-linux-x86_64.tar.gz
          dest: /opt
          remote_src: true
        when: not gcloud_installed.stat.exists

      - name: Run Google Cloud SDK install script
        ansible.builtin.command:
          cmd: /opt/google-cloud-sdk/install.sh --quiet --path-update false --command-completion false
        when: not gcloud_installed.stat.exists
        changed_when: true

      - name: Install gke-gcloud-auth-plugin component
        ansible.builtin.command:
          cmd: /opt/google-cloud-sdk/bin/gcloud components install gke-gcloud-auth-plugin --quiet
        register: gke_plugin_install
        changed_when: "'All components are up to date' not in gke_plugin_install.stderr"

      - name: Create /etc/profile.d/google-cloud-sdk.sh for PATH integration
        ansible.builtin.copy:
          dest: /etc/profile.d/google-cloud-sdk.sh
          mode: "0644"
          content: |
            # Google Cloud SDK PATH integration
            if [ -d /opt/google-cloud-sdk/bin ]; then
              export PATH="/opt/google-cloud-sdk/bin:$PATH"
            fi

      - name: Install bash completion for gcloud
        ansible.builtin.file:
          src: /opt/google-cloud-sdk/completion.bash.inc
          dest: /etc/bash_completion.d/google-cloud-sdk
          state: link

      - name: Clean up downloaded tarball
        ansible.builtin.file:
          path: /tmp/google-cloud-cli-linux-x86_64.tar.gz
          state: absent

# ─── AI tools configuration ───────────────────────────────────────────────
- name: Configure AI tools
  tags: [sf-toolbox, packages, ai]
  block:
    - name: Ensure zsh site-functions directory exists
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Generate opencode zsh completions
      ansible.builtin.command: opencode completion
      register: opencode_completion_output
      changed_when: false
      failed_when: false

    - name: Write opencode completions to file
      ansible.builtin.copy:
        content: "{{ opencode_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_opencode"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - opencode_completion_output is not skipped
        - opencode_completion_output.rc == 0

    - name: Generate openspec zsh completions
      ansible.builtin.command: openspec completion generate zsh
      register: openspec_completion_output
      changed_when: false
      failed_when: false

    - name: Write openspec completions to file
      ansible.builtin.copy:
        content: "{{ openspec_completion_output.stdout }}\n"
        dest: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_openspec"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when:
        - openspec_completion_output is not skipped
        - openspec_completion_output.rc == 0

    - name: Create ~/.config/opencode directory
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.config/opencode"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Check if opencode config file exists in sparkdock
      ansible.builtin.stat:
        path: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
      register: sparkdock_opencode_config_stat

    - name: Copy opencode config file from sparkdock if available
      ansible.builtin.copy:
        src: "{{ sparkdock.path | default(sparkdock_default_path) }}/config/macos/opencode.json"
        dest: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when: sparkdock_opencode_config_stat.stat.exists

    - name: Create opencode config file as fallback
      ansible.builtin.copy:
        dest: "{{ system.home | default(current_home) }}/.config/opencode/opencode.json"
        src: "opencode/opencode.json"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"
      when: not sparkdock_opencode_config_stat.stat.exists

# ─── glab configuration ───────────────────────────────────────────────────
- name: Configure glab
  tags: [sf-toolbox, packages, glab]
  block:
    - name: Ensure zsh site-functions directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions"
        state: directory
        mode: "0755"

    - name: Generate glab zsh completion
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.shell: |
        glab completion -s zsh > "{{ system.home | default(current_home) }}/.local/share/zsh/site-functions/_glab"
      changed_when: true

    - name: Ensure ajust recipes directory exists
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/spark/ajust/recipes"
        state: directory
        mode: "0755"

    - name: Create glab ajust recipe
      become: yes
      become_user: "{{ system.username | default(current_user) }}"
      ansible.builtin.copy:
        src: glab/01-gitlab.just
        dest: "{{ system.home | default(current_home) }}/.local/spark/ajust/recipes/01-gitlab.just"
        mode: "0644"

# ─── SparkFabrik HTTP Proxy ────────────────────────────────────────────────
- name: Install and configure SparkFabrik HTTP Proxy
  tags: [sf-toolbox, packages, spark-http-proxy]
  block:
    - name: Configure mkcert
      ansible.builtin.command: mkcert -install
      changed_when: true

    - name: Download SparkFabrik HTTP Proxy script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/sparkfabrik/http-proxy/refs/heads/main/bin/spark-http-proxy
        dest: /usr/local/bin/spark-http-proxy
        mode: "0755"

    - name: Create ~/.local/spark/http-proxy directory
      ansible.builtin.file:
        path: "{{ system.home | default(current_home) }}/.local/spark/http-proxy"
        state: directory
        mode: "0755"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Ensure ~/.local/spark directory ownership
      ansible.builtin.file:
        dest: "{{ system.home | default(current_home) }}/.local/spark"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Download SparkFabrik HTTP Proxy compose file
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/sparkfabrik/http-proxy/refs/heads/main/bin/compose.yml
        dest: "{{ system.home | default(current_home) }}/.local/spark/http-proxy/compose.yml"
        mode: "0644"
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

    - name: Set ownership of spark-http-proxy script
      ansible.builtin.file:
        dest: /usr/local/bin/spark-http-proxy
        owner: "{{ system.username | default(current_user) }}"
        group: "{{ system.username | default(current_user) }}"

---
# SparkFabrik Linux Toolbox — Package Definitions
#
# Single source of truth for the sf-toolbox installer and Ansible playbook.
# Auto-loaded by Ansible as role vars (playbooks/roles/sf-toolbox/vars/main.yml).
# Also read by bin/install.linux (via bin/common/parse-toolbox-packages.py).

toolbox:
  # ─── Arch Linux ──────────────────────────────────────────────────────────
  arch:
    pacman:
      - just
      - gum
      - github-cli
      - glab
      - mkcert
      - nss
      - opencode
      - gopls
    npm:
      - "@fission-ai/openspec"
      - "@github/copilot"
      - intelephense
      - typescript
      - typescript-language-server
      - pyright
    remove:
      pacman:
        - google-cloud-cli
        - google-cloud-cli-gke-gcloud-auth-plugin

  # ─── Debian / Ubuntu ────────────────────────────────────────────────────
  debian:
    apt:
      - libnss3-tools
      - nodejs
      - npm
    homebrew_taps:
      - anomalyco/tap
    homebrew:
      - just
      - gum
      - gh
      - glab
      - mkcert
      - anomalyco/tap/opencode
      - openspec
      - gopls
    homebrew_casks:
      - claude-code
    # copilot-cli is installed via npm instead of brew cask because the
    # cask definition uses generate_completions_from_executable which is
    # broken on older Homebrew versions (e.g. Ubuntu 24.04).
    npm:
      - "@github/copilot"
      - intelephense
      - typescript
      - typescript-language-server
      - pyright

  # ─── Common (both OSes) ─────────────────────────────────────────────────
  common:
    remove:
      npm:
        - opencode-ai

  # ─── Detection ──────────────────────────────────────────────────────────
  # Binary names managed by sf-toolbox. Used by bin/install.linux to show
  # current install status before running Ansible.
  detect:
    - opencode
    - openspec
    - copilot
    - claude
    - gh
    - glab
    - gcloud
    - mkcert
    - just
    - gum
    - ajust
    - rtk
    - spark-http-proxy
    - intelephense
    - typescript-language-server
    - pyright-langserver
    - gopls

  # ─── Prerequisites ──────────────────────────────────────────────────────
  # Must be available as commands before sf-toolbox runs.
  # The install script checks these and fails with guidance if missing.
  prerequisites:
    common:
      - git
      - zsh
      - docker
      - curl
      - python3
    arch:
      - node
      - npm

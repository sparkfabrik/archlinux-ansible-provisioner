---
# SparkFabrik Linux Toolbox — Package Definitions
#
# Single source of truth for the sf-toolbox installer and Ansible playbook.
# Read by bin/install.linux (via bin/common/parse-toolbox-packages.py) and
# playbooks/sf-toolbox.yml (via include_vars).

# ─── Arch Linux ────────────────────────────────────────────────────────────
arch:
  pacman:
    - just
    - gum
    - glab
    - mkcert
    - nss
    - opencode
  npm:
    - "@fission-ai/openspec"
  remove:
    pacman:
      - google-cloud-cli
      - google-cloud-cli-gke-gcloud-auth-plugin

# ─── Debian / Ubuntu ──────────────────────────────────────────────────────
debian:
  apt:
    - libnss3-tools
  homebrew_taps:
    - anomalyco/tap
  homebrew:
    - just
    - gum
    - glab
    - mkcert
    - anomalyco/tap/opencode
    - openspec

# ─── Common (both OSes) ───────────────────────────────────────────────────
common:
  remove:
    npm:
      - opencode-ai

# ─── Detection ────────────────────────────────────────────────────────────
# Binary names managed by sf-toolbox. Used by bin/install.linux to show
# current install status before running Ansible.
detect:
  - opencode
  - openspec
  - glab
  - gcloud
  - mkcert
  - just
  - gum
  - ajust
  - spark-http-proxy

# ─── Prerequisites ────────────────────────────────────────────────────────
# Must be available as commands before sf-toolbox runs.
# The install script checks these and fails with guidance if missing.
prerequisites:
  common:
    - git
    - zsh
    - docker
    - curl
    - python3
  arch:
    - node
    - npm
